<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹生存战 - Neon Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }
        
        canvas {
            display: block;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            border: 2px solid #00ffff;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px #00ffff;
            pointer-events: none;
        }
        #ui div {
            margin: 5px 0;
        }
        /* 波次倒计时UI样式 */
        #waveTimer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ffff;
            font-size: 18px;
            text-shadow: 0 0 10px #00ffff;
            pointer-events: none;
        }
        /* 新增：经验条样式 */
        #expBar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffff00;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.5);
        }
        #expFill {
            height: 100%;
            background: linear-gradient(90deg, #ffff00, #ff9900);
            transition: width 0.3s ease;
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.5);
        }
        #expText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px #000;
        }
        
        #healthBar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        #healthFill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #ff00ff, #aa00ff);
            transition: width 0.3s ease;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #healthText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 5px #000;
        }
        /* 游戏结束、暂停、通关提示通用样式 */
        #gameOver, #gamePause, #gameWin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 48px;
            text-shadow: 0 0 20px currentColor;
            display: none;
            animation: pulse 1s infinite;
        }
        #gameOver {
            color: #ff0066;
        }
        #gamePause {
            color: #00ffff;
        }
        /* 新增：通关胜利提示样式 */
        #gameWin {
            color: #00ff66;
        }
        #gameOver div, #gamePause div, #gameWin div {
            font-size: 24px;
            margin-top: 20px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        #instructions {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
            white-space: nowrap;
        }
        
        .damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(255, 0, 0, 0.3) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="damage-overlay" id="damageOverlay"></div>
        <!-- 游戏UI：得分、波次、等级、攻击力 -->
        <div id="ui">
            <div>得分: <span id="score">0</span></div>
            <div>波次: <span id="wave">1</span>/10</div>
            <div>等级: <span id="level">1</span>/20</div>
            <div>攻击力: <span id="attack">1</span></div>
        </div>
        <!-- 波次倒计时UI -->
        <div id="waveTimer">剩余时间: <span id="timerText">300</span>s</div>
        <!-- 新增：经验条UI -->
        <div id="expBar">
            <div id="expFill" style="width: 0%"></div>
            <div id="expText">0/100 经验</div>
        </div>
        <!-- 玩家血条 -->
        <div id="healthBar">
            <div id="healthFill" style="width: 100%"></div>
            <div id="healthText">200/200</div>
        </div>
        <!-- 操作说明 -->
        <div id="instructions">
            WASD移动 | 鼠标瞄准射击 | 空格暂停 | 坚持5分钟通关！
        </div>
        <!-- 游戏结束提示 -->
        <div id="gameOver">
            <div>GAME OVER</div>
            <div style="font-size: 24px; margin-top: 20px;">按 R 重新开始</div>
        </div>
        <!-- 游戏暂停提示 -->
        <div id="gamePause">
            <div>PAUSED</div>
            <div style="font-size: 24px; margin-top: 20px;">按 空格 继续</div>
        </div>
        <!-- 新增：游戏通关胜利提示 -->
        <div id="gameWin">
            <div>YOU WIN!</div>
            <div style="font-size: 24px; margin-top: 20px;">成功坚持5分钟！按 R 重新挑战</div>
        </div>
    </div>
    <script>
        // ================================= 基础初始化 =================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const damageOverlay = document.getElementById('damageOverlay');
        const gamePause = document.getElementById('gamePause');
        const gameWin = document.getElementById('gameWin'); // 通关画面
        const timerText = document.getElementById('timerText');
        // 经验条、等级、攻击力DOM
        const expFill = document.getElementById('expFill');
        const expText = document.getElementById('expText');
        const levelText = document.getElementById('level');
        const attackText = document.getElementById('attack');
        const waveText = document.getElementById('wave');
        
        // 游戏配置常量
        const METER_TO_PIXEL = 50;          
        // 视野扩大5米：原7米 → 12米
        const DANGER_RADIUS = 12 * METER_TO_PIXEL; 
        const CENTER_X = canvas.width / 2;  
        const CENTER_Y = canvas.height / 2;
        // 核心配置：5分钟通关（300秒），共10波次
        const TOTAL_GAME_TIME = 5 * 60 * 1000; // 总游戏时间300000毫秒
        const TOTAL_WAVES = 10;                // 总波次10
        const WAVE_INTERVAL = TOTAL_GAME_TIME / TOTAL_WAVES; // 每波30秒
        
        // ================================= 游戏状态 =================================
        let gameRunning = true;  
        let gamePaused = false;  
        let gameCleared = false; // 通关标识
        let score = 0;           
        let wave = 1;            
        let lastTime = 0;        
        let gameTimer = TOTAL_GAME_TIME; // 总游戏倒计时（毫秒）
        // 新增：玩家升级系统状态
        let playerLevel = 1;     // 初始等级1，满级20
        let playerExp = 0;       // 当前经验
        let playerExpNeed = 100; // 升级所需经验（初始门槛低，逐步提高）
        let playerAttack = 1;    // 初始攻击力1，升级提升
        
        // ================================= 玩家对象 =================================
        const player = {
            x: CENTER_X,          
            y: CENTER_Y,          
            radius: 15,           
            speed: 3,             
            maxHealth: 200,       // 初始最大血量200，升级提升
            health: 200,          
            angle: 0,             
            shootCooldown: 0,     
            color: '#00ffff'      
        };
        
        // ================================= 输入状态 =================================
        const keys = {};         
        const mouse = {          
            x: CENTER_X,         
            y: CENTER_Y,         
            down: false          
        };
        
        // ================================= 游戏对象数组 =================================
        let bullets = [];   
        let enemies = [];   
        let particles = []; 
        
        // ================================= 敌人类型配置（基础属性） =================================
        const enemyTypes = {
            normal: { color: '#ff0066', speed: 0.4, baseHealth: 1, radius: 12, damage: 10, exp: 10 }, // 基础血量+经验10
            tank: { color: '#ff6600', speed: 0.4, baseHealth: 3, radius: 18, damage: 15, exp: 30 },     // 基础血量+经验30
            fast: { color: '#ffff00', speed: 0.6, baseHealth: 1, radius: 10, damage: 8, exp: 15 }      // 基础血量+经验15
        };
        // ================================= 游戏方法 - 生成敌人（随波次加血量） =================================
        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const distance = DANGER_RADIUS + 20;
            const x = CENTER_X + Math.cos(angle) * distance;
            const y = CENTER_Y + Math.sin(angle) * distance;
            
            // 波次越高，高级敌人概率越大
            let type = 'normal';
            const rand = Math.random();
            if (wave > 4 && rand < 0.2) type = 'tank';    // 4波后坦克概率20%
            else if (wave > 2 && rand < 0.4) type = 'fast';// 2波后快速概率40%
            
            const config = enemyTypes[type];
            // 核心：敌人随波次增加血量 → 基础血量 + (波次-1)*0.5 ，向下取整（波次越高血越厚）
            const waveHealthBonus = Math.floor((wave - 1) * 0.5);
            const finalHealth = config.baseHealth + waveHealthBonus;
            
            enemies.push({
                x, y,
                type,
                color: config.color,
                speed: config.speed,
                radius: config.radius,
                damage: config.damage,
                exp: config.exp, // 敌人携带的经验值
                baseHealth: config.baseHealth,
                currentHealth: finalHealth, // 最终血量（基础+波次加成）
                flash: 0
            });
        }
        // ================================= 游戏方法 - 创建粒子特效 =================================
        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3),
                    life: 1,
                    color,
                    size: 3 + Math.random() * 4
                });
            }
        }
        // ================================= 新增：玩家升级方法（核心） =================================
        function levelUp() {
            if (playerLevel >= 20) return; // 满级20级，无法再升级
            // 升级属性提升：攻击力+1，最大血量+20，当前血量回满
            playerLevel++;
            playerAttack++;
            player.maxHealth += 20;
            player.health = player.maxHealth; // 升级回满血量
            // 升级所需经验提升（门槛越来越高：每次乘以1.5并取整，后期升级更难）
            playerExpNeed = Math.floor(playerExpNeed * 1.5);
            // 经验值重置（超出部分不累加，公平升级）
            playerExp = 0;
            // 更新UI显示
            levelText.textContent = playerLevel;
            attackText.textContent = playerAttack;
            updateHealthBar();
            updateExpBar();
            // 升级粒子特效（绿色，庆祝升级）
            createParticles(player.x, player.y, '#00ff66', 20);
        }
        // ================================= 新增：更新经验条UI =================================
        function updateExpBar() {
            if (playerLevel >= 20) {
                // 满级后经验条满值，显示满级
                expFill.style.width = '100%';
                expText.textContent = '满级20级！';
                return;
            }
            // 计算经验百分比
            const expPercent = Math.min(100, (playerExp / playerExpNeed) * 100);
            expFill.style.width = expPercent + '%';
            expText.textContent = `${playerExp}/${playerExpNeed} 经验`;
            // 经验达标自动升级
            if (playerExp >= playerExpNeed) {
                levelUp();
            }
        }
        // ================================= 游戏方法 - 更新血条UI =================================
        function updateHealthBar() {
            const healthPercent = Math.max(0, (player.health / player.maxHealth) * 100);
            document.getElementById('healthFill').style.width = healthPercent + '%';
            document.getElementById('healthText').textContent = 
                Math.ceil(player.health) + '/' + player.maxHealth;
            // 低血量警告（<30%红橙渐变，≥30%原粉紫渐变）
            if (healthPercent < 30) {
                document.getElementById('healthFill').style.background = 
                    'linear-gradient(90deg, #ff0000, #ff6600)';
            } else {
                document.getElementById('healthFill').style.background = 
                    'linear-gradient(90deg, #ff0066, #ff00ff, #aa00ff)';
            }
        }
        // ================================= 游戏方法 - 更新游戏逻辑（核心） =================================
        function update(deltaTime) {
            if (!gameRunning || gamePaused || gameCleared) return;
            
            // 核心：总游戏倒计时（5分钟）
            gameTimer -= deltaTime;
            const remainingSeconds = Math.max(0, Math.floor(gameTimer / 1000));
            timerText.textContent = remainingSeconds;
            
            // 波次自动升级：每30秒一波，共10波
            const currentWave = Math.min(TOTAL_WAVES, Math.floor((TOTAL_GAME_TIME - gameTimer) / WAVE_INTERVAL) + 1);
            if (currentWave !== wave) {
                wave = currentWave;
                waveText.textContent = `${wave}/${TOTAL_WAVES}`;
                // 波次升级玩家小幅回血（20点，不超最大血量）
                player.health = Math.min(player.maxHealth, player.health + 20);
                updateHealthBar();
            }
            
            // 通关判定：时间归0且完成10波 → 游戏胜利
            if (gameTimer <= 0 && wave >= TOTAL_WAVES) {
                gameClear();
                return;
            }

            // ---------------------- 玩家移动逻辑 ----------------------
            let dx = 0, dy = 0;
            if (keys['w'] || keys['W']) dy -= 1;
            if (keys['s'] || keys['S']) dy += 1;
            if (keys['a'] || keys['A']) dx -= 1;
            if (keys['d'] || keys['D']) dx += 1;
            
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;
                player.x += dx * player.speed;
                player.y += dy * player.speed;
            }
            
            // 限制玩家在新视野（12米）内活动
            const distFromCenter = Math.sqrt(
                Math.pow(player.x - CENTER_X, 2) + 
                Math.pow(player.y - CENTER_Y, 2)
            );
            if (distFromCenter > DANGER_RADIUS - player.radius) {
                const angle = Math.atan2(player.y - CENTER_Y, player.x - CENTER_X);
                player.x = CENTER_X + Math.cos(angle) * (DANGER_RADIUS - player.radius);
                player.y = CENTER_Y + Math.sin(angle) * (DANGER_RADIUS - player.radius);
            }
            
            // ---------------------- 玩家朝向与射击逻辑（攻击力影响伤害） ----------------------
            player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            
            if (player.shootCooldown > 0) player.shootCooldown--;
            if (mouse.down && player.shootCooldown <= 0) {
                bullets.push({
                    x: player.x + Math.cos(player.angle) * 20,
                    y: player.y + Math.sin(player.angle) * 20,
                    vx: Math.cos(player.angle) * 8,
                    vy: Math.sin(player.angle) * 8,
                    life: 120, // 视野扩大，子弹生命周期延长至120帧
                    damage: playerAttack // 子弹伤害=玩家攻击力
                });
                player.shootCooldown = 8;
                createParticles(player.x + Math.cos(player.angle) * 20, 
                               player.y + Math.sin(player.angle) * 20, 
                               '#00ffff', 3);
            }
            
            // ---------------------- 子弹更新逻辑 ----------------------
            bullets = bullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                b.life--;
                return b.life > 0;
            });
            
            // ---------------------- 敌人更新逻辑 ----------------------
            enemies.forEach(enemy => {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;
                if (enemy.flash > 0) enemy.flash--;
            });
            
            // ---------------------- 碰撞检测 - 子弹打敌人（攻击力生效+获得经验） ----------------------
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    const dist = Math.sqrt(
                        Math.pow(bullet.x - enemy.x, 2) + 
                        Math.pow(bullet.y - enemy.y, 2)
                    );
                    if (dist < enemy.radius + 5) {
                        // 敌人掉血=子弹伤害（玩家攻击力）
                        enemy.currentHealth -= bullet.damage;
                        enemy.flash = 5;
                        bullets.splice(bi, 1);
                        
                        // 敌人被消灭：获得经验+加分+粒子特效
                        if (enemy.currentHealth <= 0) {
                            createParticles(enemy.x, enemy.y, enemy.color, 12);
                            enemies.splice(ei, 1);
                            // 获得敌人经验
                            playerExp += enemy.exp;
                            // 加分：坦克30，快速20，普通10
                            score += enemy.type === 'tank' ? 30 : 
                                    enemy.type === 'fast' ? 20 : 10;
                            // 更新UI
                            document.getElementById('score').textContent = score;
                            updateExpBar();
                        }
                    }
                });
            });
            
            // ---------------------- 碰撞检测 - 敌人撞玩家 ----------------------
            enemies.forEach((enemy, ei) => {
                const dist = Math.sqrt(
                    Math.pow(player.x - enemy.x, 2) + 
                    Math.pow(player.y - enemy.y, 2)
                );
                if (dist < player.radius + enemy.radius) {
                    player.health -= enemy.damage;
                    enemies.splice(ei, 1);
                    createParticles(player.x, player.y, '#ff0000', 10);
                    
                    damageOverlay.style.opacity = '1';
                    setTimeout(() => damageOverlay.style.opacity = '0', 200);
                    
                    updateHealthBar();
                    
                    // 玩家血量归0 → 游戏结束
                    if (player.health <= 0) {
                        gameOver();
                    }
                }
            });
            
            // ---------------------- 粒子特效更新 ----------------------
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life -= 0.05;
                return p.life > 0;
            });
            
            // ---------------------- 敌人生成逻辑（波次越高，生成越快） ----------------------
            if (Math.random() < 0.02 + wave * 0.008) { // 生成概率小幅提升，适配10波
                spawnEnemy();
            }
        }
        // ================================= 游戏方法 - 游戏结束 =================================
        function gameOver() {
            gameRunning = false;
            gamePaused = false;
            gamePause.style.display = 'none';
            document.getElementById('gameOver').style.display = 'block';
        }
        // ================================= 新增：游戏通关胜利 =================================
        function gameClear() {
            gameCleared = true;
            gameRunning = false;
            gamePaused = false;
            gamePause.style.display = 'none';
            gameWin.style.display = 'block'; // 显示通关画面
            // 通关粒子特效（全屏绿色，庆祝胜利）
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                createParticles(x, y, '#00ff66', 5);
            }
        }
        // ================================= 游戏方法 - 重新开始游戏 =================================
        function restart() {
            // 重置所有游戏状态
            gameRunning = true;
            gamePaused = false;
            gameCleared = false;
            score = 0;
            wave = 1;
            gameTimer = TOTAL_GAME_TIME;
            // 重置升级系统
            playerLevel = 1;
            playerExp = 0;
            playerExpNeed = 100;
            playerAttack = 1;
            // 重置玩家状态
            player.maxHealth = 200;
            player.health = 200;
            player.x = CENTER_X;
            player.y = CENTER_Y;
            // 清空游戏对象
            bullets = [];
            enemies = [];
            particles = [];
            // 更新所有UI
            document.getElementById('score').textContent = '0';
            waveText.textContent = `${wave}/${TOTAL_WAVES}`;
            timerText.textContent = Math.floor(TOTAL_GAME_TIME / 1000);
            levelText.textContent = playerLevel;
            attackText.textContent = playerAttack;
            // 隐藏提示框
            document.getElementById('gameOver').style.display = 'none';
            gamePause.style.display = 'none';
            gameWin.style.display = 'none';
            // 重置血条和经验条
            updateHealthBar();
            updateExpBar();
        }
        // ================================= 游戏方法 - 暂停/继续游戏 =================================
        function togglePause() {
            if (!gameRunning || gameCleared) return;
            gamePaused = !gamePaused;
            gamePause.style.display = gamePaused ? 'block' : 'none';
            if (gamePaused) {
                mouse.down = false;
            }
        }
        // ================================= 游戏方法 - 渲染游戏画面（适配12米视野） =================================
        function render() {
            // 1. 清空画布
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. 绘制背景网格（适配大视野，网格更密）
            ctx.strokeStyle = '#1a0a2e';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 30) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // 3. 绘制新视野（12米）危险区域边界（青色发光）
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, DANGER_RADIUS, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // 4. 绘制危险区域填充（微弱青色）
            ctx.fillStyle = 'rgba(0, 255, 255, 0.03)';
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, DANGER_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            
            // 5. 绘制粒子特效
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            
            // 6. 绘制敌人（显示当前血量/总血量）
            enemies.forEach(enemy => {
                ctx.shadowBlur = enemy.flash > 0 ? 30 : 15;
                ctx.shadowColor = enemy.color;
                ctx.fillStyle = enemy.flash > 0 ? '#ffffff' : enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                // 敌人血条（适配波次加成后的血量）
                if (enemy.currentHealth < (enemy.baseHealth + Math.floor((wave - 1) * 0.5))) {
                    ctx.fillStyle = '#330000';
                    ctx.fillRect(enemy.x - 15, enemy.y - enemy.radius - 10, 30, 4);
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(enemy.x - 15, enemy.y - enemy.radius - 10, 
                                30 * (enemy.currentHealth / (enemy.baseHealth + Math.floor((wave - 1) * 0.5))), 4);
                }
            });
            
            // 7. 绘制子弹（黄色发光）
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffff00';
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            
            // 8. 绘制玩家（适配大视野，发光效果不变）
            ctx.shadowBlur = 25;
            ctx.shadowColor = player.color;
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 0.6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(
                player.x + Math.cos(player.angle) * 25,
                player.y + Math.sin(player.angle) * 25
            );
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
        // ================================= 游戏循环（主入口） =================================
        function gameLoop(timestamp) {
            // 计算帧间隔（毫秒），容错处理最大100毫秒
            const deltaTime = lastTime ? Math.min(timestamp - lastTime, 100) : 0;
            lastTime = timestamp;
            
            update(deltaTime);
            render();
            
            requestAnimationFrame(gameLoop);
        }
        // ================================= 事件监听 =================================
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            // R键重新开始（结束/通关都可触发）
            if (e.key.toLowerCase() === 'r' && (!gameRunning || gameCleared)) {
                restart();
            }
            // 空格键暂停/继续
            if (e.key === ' ' && !keys['pauseTriggered']) {
                keys['pauseTriggered'] = true;
                togglePause();
            }
        });
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
            if (e.key === ' ') {
                keys['pauseTriggered'] = false;
            }
        });
        // 鼠标移动（适配大视野）
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        // 鼠标射击（暂停/通关屏蔽）
        canvas.addEventListener('mousedown', () => {
            if (!gamePaused && !gameCleared) mouse.down = true;
        });
        canvas.addEventListener('mouseup', () => mouse.down = false);
        // ================================= 启动游戏 =================================
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
